<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>岗位分布饼图</title>
  <!-- 国内CDN更稳定，替换原CDN地址 -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:100%; height:100%; overflow:hidden; } /* 消除白边、禁止滚动 */
    #container { width:100%; height:100%; } /* 容器占满页面 */
  </style>
</head>
<body>
<div id="container"></div>
<script>
const chartDom = document.getElementById('container');
const myChart = echarts.init(chartDom);
// 替换为你的饼图配置（直接复用示例的option）
const option = {
  backgroundColor: 'transparent',
  title: {
    text: '高学历听障青年稳定岗位分布',
    left: 'center',
    textStyle: { fontSize: 18, color: '#333', fontWeight: 500 }
  },
  tooltip: { trigger: 'item', formatter: '{b}：{c}%' },
  legend: {
    top: '8%',
    left: 'center',
    data: [
      { name: '数据标注', icon: 'circle', textStyle: { color: '#3768d8' } },
      { name: '直播后台', icon: 'circle', textStyle: { color: '#56a964' } },
      { name: '手工包装', icon: 'circle', textStyle: { color: '#f2a63a' } },
      { name: '程序开发', icon: 'circle', textStyle: { color: '#d03c32' } },
      { name: '其他文职', icon: 'circle', textStyle: { color: '#824cc8' } }
    ],
    itemWidth: 12,
    itemHeight: 12
  },
  series: [
    {
      type: 'pie',
      radius: ['40%', '75%'],
      avoidLabelOverlap: false,
      label: { show: true, position: 'outside', fontSize: 10, formatter: '{c}%' },
      labelLine: { show: true, length: 8, length2: 12 },
      data: [
        { name: '数据标注', value: 37, itemStyle: { color: '#3768d8' } },
        { name: '直播后台', value: 26, itemStyle: { color: '#56a964' } },
        { name: '手工包装', value: 19, itemStyle: { color: '#f2a63a' } },
        { name: '程序开发', value: 12, itemStyle: { color: '#d03c32' } },
        { name: '其他文职', value: 6, itemStyle: { color: '#824cc8' } }
      ]
    }
  ]
};
myChart.setOption(option);
// iframe缩放时图表自适应
window.addEventListener('resize', () => myChart.resize());
</script>
</body>
</html>
